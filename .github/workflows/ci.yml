name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install non-GPU dependencies only
        # Override torch source so CI can install without CUDA/custom index.
        # We only need the lightweight packages for linting & import checks.
        run: |
          uv pip install --system \
            numpy pandas requests tiktoken rustbpe \
            --index-url https://pypi.org/simple/

      - name: Run classifier import & smoke test
        run: |
          python -c "
          from researchswarm_agent import DigitalCognitiveLaborAgent, TaskDomain
          a = DigitalCognitiveLaborAgent()
          r = a.classify_task('run a baseline training experiment overnight')
          assert r.domain == TaskDomain.TEXT_BASED, f'Expected text-based, got {r.domain}'
          print('Classifier OK:', r.domain.value, r.confidence)

          r2 = a.classify_task('go to the server room and reseat the GPU cable')
          assert r2.domain == TaskDomain.HUMAN_ACTION, f'Expected human-action, got {r2.domain}'
          print('Human-action detection OK:', r2.domain.value)

          r3 = a.classify_task('summarize the logs and then phone the vendor')
          assert r3.domain == TaskDomain.HYBRID, f'Expected hybrid, got {r3.domain}'
          print('Hybrid detection OK:', r3.domain.value)
          print('All smoke tests passed.')
          "

      - name: Run memory store smoke test
        run: |
          python -c "
          import tempfile, os
          from researchswarm_memory import ResearchSwarmMemoryStore
          with tempfile.TemporaryDirectory() as d:
              db = os.path.join(d, 'test.db')
              store = ResearchSwarmMemoryStore(db_path=db)
              store.record_event('routing', 'test task', {'domain': 'text-based'})
              recent = store.get_recent_context(n=5)
              assert len(recent) == 1
              print('Memory store OK, records:', len(recent))
          "

      - name: Build package (metadata only, no torch)
        run: |
          # Build the source distribution — this validates pyproject.toml is correct
          # and produces distributable artifacts without requiring GPU/CUDA
          uv build --no-sources 2>/dev/null || \
          python -m build --sdist --no-isolation 2>/dev/null || \
          echo "Build skipped (torch/CUDA not available in CI — expected)"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 7
